name: SOAR flagship · CI

# Lint (tsc --noEmit) + production build for the headless flagship in soar/.
# No secrets required — the app builds on placeholder content when Shopify env
# vars are absent (isShopifyConfigured fallback), so CI never needs credentials.

on:
  push:
    branches: [main, claude/nifty-bohr-7hmkl5]
    paths:
      - "soar/**"
      - ".github/workflows/soar-ci.yml"
  pull_request:
    paths:
      - "soar/**"
      - ".github/workflows/soar-ci.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: soar-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: soar
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: soar/package-lock.json

      - name: Install
        run: npm ci

      - name: Type-check (lint)
        run: npm run lint

      - name: Production build
        run: npm run build
