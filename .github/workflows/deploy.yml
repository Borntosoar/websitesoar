name: Deploy SOAR (headless) to GitHub Pages

on:
  push:
    branches: [claude/nifty-bohr-7hmkl5]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: soar-pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: soar-web/package-lock.json

      - name: Install dependencies
        working-directory: soar-web
        run: npm ci

      - name: Build static export
        working-directory: soar-web
        env:
          PAGES_EXPORT: "1"
          PAGES_BASE_PATH: /websitesoar
          NEXT_PUBLIC_SHOPIFY_DOMAIN: borntosoar.myshopify.com
          NEXT_PUBLIC_SHOPIFY_STOREFRONT_TOKEN: 824defc59c766834a07b62bded29cf2e
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./soar-web/out
          publish_branch: gh-pages
